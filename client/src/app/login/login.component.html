

<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Login</title>
  <link rel="stylesheet" href="/home/coder/app/client/src/app/login/login.component.scss">
</head>

<body>

  <div class="bg-animation"></div>

  <div class="auth-wrapper">
    <div class="auth-card fade-in">

      <h3>Welcome Back</h3>


      <form [formGroup]="itemForm" (ngSubmit)="onLogin()">

  <!-- USERNAME -->
  <div class="input-group">
    <input type="text" formControlName="username">
    <label>Username</label>

    <small class="error"
      *ngIf="
        itemForm.get('username')?.invalid &&
        (itemForm.get('username')?.touched || itemForm.get('username')?.dirty)
      ">
      Username is required
    </small>
  </div>

  <!-- PASSWORD -->
  <div class="input-group">
    <input type="password" formControlName="password">
    <label>Password</label>

    <small class="error"
      *ngIf="
        itemForm.get('password')?.invalid &&
        (itemForm.get('password')?.touched || itemForm.get('password')?.dirty)
      ">
      Password is required
    </small>
  </div>

  <button type="submit" [disabled]="itemForm.invalid">
    Sign In
  </button>

</form>

<p class="error center" *ngIf="showError">
  {{ errorMessage }}
</p>



      <p class="switch">
        Don’t have an account?
        <a routerLink="/registration">Register →</a>
      </p>
      <p>{{errorMessage}}</p>
    </div>
  </div>

</body>

</html>
