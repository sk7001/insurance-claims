<app-navbar></app-navbar>

<div class="page">

  <h1 class="page-title">Update Claims</h1>

  <!-- TABLE CARD -->
  <div class="table-card">
    <table>
      <thead>
        <tr>
          <th>Claim ID</th>
          <th>Description</th>
          <th>Status</th>
          <th>Date</th>
          <th>Underwriter</th>
          <th>Action</th>
        </tr>
      </thead>

      <tbody>
        <tr *ngFor="let claim of claimList">

          <td><strong>#{{ claim.id }}</strong></td>

          <td>{{ claim.description }}</td>

          <!-- ✅ STATUS PILL (MATCHES VIEW CLAIM STATUS) -->
          <td>
            <span
              class="status-tag"
              [ngClass]="{
                'status-approved': claim.status === 'Approved',
                'status-rejected': claim.status === 'Rejected',
                'status-inprogress': claim.status === 'In progress',
                'status-initiated': claim.status === 'Initiated'
              }"
            >
              {{ claim.status }}
            </span>
          </td>

          <td>{{ claim.date | date }}</td>

          <td>
            <ng-container *ngIf="claim.underwriter; else noUnderwriter">
              {{ claim.underwriter.username }}
              <div class="muted">{{ claim.underwriter.email }}</div>
            </ng-container>

            <ng-template #noUnderwriter>
              <span class="no-underwriter">Not Assigned</span>
            </ng-template>
          </td>

          <td>
            <button class="small-btn" (click)="edit(claim)">
              Update
            </button>
          </td>

        </tr>
      </tbody>
    </table>
  </div>

  <!-- UPDATE FORM -->
  <div
    class="form-card update-form"
    [class.hide]="closing"
    *ngIf="updatedId || closing"
  >
    <h2>Update Claim</h2>

    <form [formGroup]="itemForm" (ngSubmit)="onSubmit()">

      <div class="form-group">
        <label>Description</label>
        <input type="text" formControlName="description" />
      </div>

      <div class="form-group">
        <label>Date</label>
        <input type="date" formControlName="date" />
      </div>

      <div class="form-group">
        <label>Status</label>
        <input type="text" formControlName="status" />
      </div>

      <div class="action-buttons">
        <button type="submit" class="success-btn">
          Save Changes
        </button>

        <button
          type="button"
          class="cancel-btn"
          (click)="cancelUpdate()"
        >
          Cancel
        </button>
      </div>

    </form>

    <div *ngIf="showError" class="error-box">
      {{ errorMessage || 'Failed to update claim' }}
    </div>
  </div>

</div>
