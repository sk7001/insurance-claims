
<div class="cc-shell">
  <div class="cc-container">
    <div class="cc-card">

      <!-- CURVED DARK BANNER -->
      <div class="cc-banner">
        <div class="cc-banner-dots"></div>

        <div class="cc-banner-pill">
          <div class="cc-pill-dot"></div>
          Internal Workflow
        </div>

        <h2>Assign Claim</h2>
        <p>Select a claim and an underwriter to proceed with the assignment.</p>

        <svg class="cc-banner-wave" viewBox="0 0 480 52" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none">
          <path d="M0,52 L0,18 C80,2 160,0 240,14 C320,28 400,44 480,28 L480,52 Z" fill="#ffffff"/>
          <path d="M0,52 L0,30 C100,14 200,8 300,20 C390,30 440,42 480,36 L480,52 Z" fill="#f0f0f5" opacity="0.6"/>
        </svg>
      </div>

      <!-- FORM BODY -->
      <div class="cc-body">
        <form [formGroup]="itemForm" (ngSubmit)="onSubmit()" class="cc-form">

          <!-- CLAIM DROPDOWN -->
          <div class="cc-field dropdown">
            <label>Claim</label>

            <!-- DROPDOWN BOX -->
            <div class="dropdown-box" (click)="toggleClaimDropdown()">
              <span class="trigger-text" *ngIf="!selectedClaimText">Select Claim</span>
              <span class="trigger-text" *ngIf="selectedClaimText">{{ selectedClaimText }}</span>
              <span class="arrow">▼</span>
            </div>

            <!-- DROPDOWN MENU -->
            <div class="dropdown-menu" *ngIf="claimDropdownOpen">
              <input
                type="text"
                class="dropdown-search-input"
                placeholder="Search by claim / policyholder..."
                [(ngModel)]="claimSearch"
                (input)="filterClaims()"
                [ngModelOptions]="{ standalone: true }"
                (click)="$event.stopPropagation()"
              />

              <div class="dropdown-list">
                <button
                  type="button"
                  class="dropdown-item complex-item"
                  *ngFor="let claim of filteredClaimList"
                  (click)="selectClaim(claim)"
                >
                  <div class="claim-left">
                    <div class="item-main">
                      <strong>#{{ claim.id }}</strong>
                      <span class="assigned-badge status-approved" *ngIf="claim.status === 'Approved'">Approved</span>
                      <span class="assigned-badge status-rejected" *ngIf="claim.status === 'Rejected'">Rejected</span>
                      <span class="assigned-badge" *ngIf="claim.status !== 'Approved' && claim.status !== 'Rejected' && claim.underwriter">Assigned</span>
                      <span class="item-dot">•</span>
                      <span class="item-desc">
                        <span class="claim-type" *ngIf="claim.insuranceType">{{ claim.insuranceType }} -</span>
                        {{ claim.description }}
                      </span>
                    </div>
                    <div class="item-sub">
                      {{ claim.date | date }}
                    </div>
                  </div>

                  <div class="claim-right" *ngIf="claim.policyholder">
                    <div class="ph-name">{{ claim.policyholder.username || 'Unknown' }}</div>
                    <div class="ph-muted" *ngIf="claim.policyholder.email">{{ claim.policyholder.email }}</div>
                    <div class="ph-muted" *ngIf="claim.policyholder.phoneNumber">{{ claim.policyholder.phoneNumber }}</div>
                  </div>
                  <div class="claim-right" *ngIf="!claim.policyholder">
                    <div class="ph-name">No policyholder</div>
                  </div>
                </button>

                <div class="dropdown-empty" *ngIf="filteredClaimList.length === 0">
                  No claims found
                </div>
              </div>
            </div>

            <span class="form-error" *ngIf="itemForm.get('claimId')?.invalid && showError">Claim is required</span>
          </div>

          <!-- UNDERWRITER DROPDOWN -->
          <div class="cc-field dropdown">
            <label>Underwriter</label>

            <!-- DROPDOWN BOX -->
            <div class="dropdown-box" (click)="toggleUnderDropdown()">
              <span class="trigger-text" *ngIf="!selectedUnderwriterText">Select Underwriter</span>
              <span class="trigger-text" *ngIf="selectedUnderwriterText">{{ selectedUnderwriterText }}</span>
              <span class="arrow">▼</span>
            </div>

            <!-- DROPDOWN MENU -->
            <div class="dropdown-menu" *ngIf="underDropdownOpen">
              <input
                type="text"
                class="dropdown-search-input"
                placeholder="Search by id / username / email..."
                [(ngModel)]="underwriterSearch"
                (input)="filterUnderwriters()"
                [ngModelOptions]="{ standalone: true }"
                (click)="$event.stopPropagation()"
              />

              <div class="dropdown-list">
                <button
                  type="button"
                  class="dropdown-item complex-item"
                  *ngFor="let u of filteredUnderwriterList"
                  (click)="selectUnderwriter(u)"
                >
                  <!-- Left: ID + Name -->
                  <div class="claim-left">
                    <div class="item-main">
                      <strong>#{{ u.id }}</strong>
                      <span class="item-dot">•</span>
                      <span class="item-desc">{{ u.username }}</span>
                    </div>
                    <div class="item-sub">
                      <span class="active-count-badge" [ngClass]="{'has-cases': u.activeCount > 0}">
                        {{ u.activeCount || 0 }} Active Cases
                      </span>
                    </div>
                  </div>

                  <!-- Right: Email + Phone -->
                  <div class="claim-right">
                    <div class="ph-name">{{ u.email }}</div>
                    <div class="ph-muted" *ngIf="u.phoneNumber">{{ u.phoneNumber }}</div>
                  </div>
                </button>

                <div class="dropdown-empty" *ngIf="filteredUnderwriterList.length === 0">
                  No underwriters found
                </div>
              </div>
            </div>

            <span class="form-error" *ngIf="itemForm.get('underwriterId')?.invalid && showError">Underwriter is required</span>
          </div>

          <button type="submit" class="cc-submit-btn">
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
              <path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="8.5" cy="7" r="4"/><line x1="20" y1="8" x2="20" y2="14"/><line x1="23" y1="11" x2="17" y2="11"/>
            </svg>
            Assign Claim
          </button>

        </form>

      </div>
    </div>
  </div>
</div>
