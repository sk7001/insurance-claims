<button class="chat-fab" [class.is-open]="isOpen" (click)="toggleChat()">
  <div class="fab-inner" *ngIf="!isOpen">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
      <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z" />
    </svg>
    <span class="fab-dot"></span>
  </div>
</button>

<div class="chat-win dark" [class.visible]="isOpen">

  <div class="cw-header">
    <button class="cw-back-btn" (click)="toggleChat()">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polyline points="15 18 9 12 15 6" />
      </svg>
    </button>
    <div class="cw-id">
      <div class="cw-ava">
        <div class="cw-ava-grad"></div>
        <span>N</span>
        <span class="cw-status-dot"></span>
      </div>
      <div class="cw-name-block">
        <h4>Nexus AI</h4>
        <p>Active</p>
      </div>
    </div>
    <button class="cw-info">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="10" />
        <line x1="12" y1="8" x2="12" y2="12" />
        <line x1="12" y1="16" x2="12.01" y2="16" />
      </svg>
    </button>
  </div>

  <div class="cw-body" #chatBody>
    <div class="cw-intro">
      <div class="cw-intro-av">
        <div class="cw-intro-ring"></div>
        <span>N</span>
      </div>
      <h4>Nexus AI</h4>
      <p>Insurance Intelligence Assistant</p>
    </div>

    <div class="msg-row" *ngFor="let m of messages" [ngClass]="m.from">
      <div class="msg-bubble" [innerHTML]="formatText(m.text)"></div>
    </div>

    <div class="msg-row bot" *ngIf="loading">
      <div class="typing-bubble">
        <span></span><span></span><span></span>
      </div>
    </div>
    
    <div class="msg-row bot" *ngIf="isQueued">
      <div class="msg-bubble queue-msg">
        ⏳ Rate limit exceeded. Refilling in {{ retrySeconds }}s...
      </div>
    </div>
  </div>

  <div class="cw-input-bar">
    <button class="cib-btn">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
        <circle cx="12" cy="12" r="10" />
        <path d="M8 14s1.5 2 4 2 4-2 4-2" />
      </svg>
    </button>
    <input 
      class="cib-input" 
      [(ngModel)]="inputText" 
      (keydown)="onEnter($event)" 
      placeholder="Message…" 
    />
    <button class="cib-mic">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
        <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z" />
        <path d="M19 10v2a7 7 0 0 1-14 0v-2" />
        <line x1="12" y1="19" x2="12" y2="23" />
        <line x1="8" y1="23" x2="16" y2="23" />
      </svg>
    </button>
    <button class="cib-send" (click)="sendMessage()" [disabled]="!inputText.trim() || loading">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5">
        <line x1="22" y1="2" x2="11" y2="13" />
        <polygon points="22 2 15 22 11 13 2 9 22 2" />
      </svg>
    </button>
  </div>
</div>
