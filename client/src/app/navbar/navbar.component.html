<nav class="d-sidebar">
  <div class="ds-brand">
    <button class="ds-profile-btn" *ngIf="userName">
       <img [src]="'https://ui-avatars.com/api/?name=' + userName + '&background=474a51&color=fff'" class="ds-avatar">
       <div class="ds-pinfo">
         <h4>{{ userName }}</h4>
         <p *ngIf="roleName">{{ roleName }}</p>
       </div>
    </button>
  </div>

  <div class="ds-section">
    <div class="ds-label">
      <span routerLink="/dashboard">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>
        Dashboard
      </span>
    </div>
  </div>

  <div class="ds-section" *ngIf="IsLoggin">
    <div class="ds-group-label" style="user-select: none;">
       <span>
         <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path><polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline><line x1="12" y1="22.08" x2="12" y2="12"></line></svg>
         Core Workflow
       </span>
    </div>
    <ul class="ds-menu">
      <ng-container *ngIf="roleName === 'POLICYHOLDER' || roleName === 'ADMIN' || !roleName">
        <li>
          <a routerLink="/create-claim" routerLinkActive="active">
            <span>Create Claim</span>
          </a>
        </li>
        <li>
          <a routerLink="/view-claim-status" routerLinkActive="active">
            <span>View Status</span>
          </a>
        </li>
      </ng-container>

      <li *ngIf="roleName === 'ADJUSTER' || roleName === 'ADMIN' || !roleName">
        <a routerLink="/assign-claim" routerLinkActive="active">
          <span>Assign Claim</span>
        </a>
      </li>
      <li *ngIf="roleName === 'ADJUSTER' || roleName === 'UNDERWRITER' || roleName === 'ADMIN' || !roleName">
        <a routerLink="/update-claim" routerLinkActive="active">
          <span>Process Claims</span>
        </a>
      </li>
      <li *ngIf="roleName === 'INVESTIGATOR' || roleName === 'ADMIN' || !roleName">
        <a routerLink="/create-investigator" routerLinkActive="active">
          <span>Investigators</span>
        </a>
      </li>
    </ul>

  </div>

  <div class="ds-bottom">


    <!-- Toggles & Logout row -->
    <div class="ds-toggles-row">
      <button class="ds-logout" (click)="logout()" title="Logout">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        <span class="logout-text">Logout</span>
      </button>
    </div>
  </div>
</nav>
