<nav class="d-sidebar" [class.collapsed]="isCollapsed">
  <div class="sidebar-header-actions">
    <button class="sleek-toggle-btn" (click)="toggleSidebar()" title="Toggle Sidebar">
      <!-- Panel Left Close -->
      <svg *ngIf="!isCollapsed" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect width="18" height="18" x="3" y="3" rx="2" />
        <path d="M9 3v18" />
        <path d="m16 15-3-3 3-3" />
      </svg>
      <!-- Panel Left Open -->
      <svg *ngIf="isCollapsed" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect width="18" height="18" x="3" y="3" rx="2" />
        <path d="M9 3v18" />
        <path d="m14 9 3 3-3 3" />
      </svg>
    </button>
  </div>
  <div class="ds-brand">
    <button class="ds-profile-btn" *ngIf="userName" routerLink="/profile" routerLinkActive="active">
      <img [src]="'https://ui-avatars.com/api/?name=' + (fullName || userName) + '&background=6366f1&color=fff'"
        class="ds-avatar">
      <div class="ds-pinfo">
        <h4>{{ userName }}</h4>
        <p *ngIf="roleName">{{ roleName }}</p>
      </div>
    </button>
  </div>

  <div class="ds-section">
    <div class="ds-pill-item" routerLink="/dashboard" routerLinkActive="active">
      <div class="ds-icon-box">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="3" width="7" height="7"></rect>
          <rect x="14" y="3" width="7" height="7"></rect>
          <rect x="14" y="14" width="7" height="7"></rect>
          <rect x="3" y="14" width="7" height="7"></rect>
        </svg>
      </div>
      <span>Dashboard</span>
    </div>
  </div>

  <div class="ds-section" *ngIf="IsLoggin">
    <div class="ds-group-label" style="user-select: none; margin-bottom: 12px;">
      <span>Workflow</span>
    </div>

    <div class="ds-pills-container">
      <ng-container *ngIf="roleName === 'POLICYHOLDER' || roleName === 'ADMIN' || !roleName">
        <div class="ds-pill-item" routerLink="/create-claim" routerLinkActive="active">
          <div class="ds-icon-box">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M12 5v14M5 12h14" />
            </svg>
          </div>
          <span>Create Claim</span>
        </div>
        <div class="ds-pill-item" routerLink="/view-claim-status" routerLinkActive="active">
          <div class="ds-icon-box">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
              <circle cx="12" cy="12" r="3" />
            </svg>
          </div>
          <span>View Claims</span>
        </div>
      </ng-container>

      <div class="ds-pill-item" *ngIf="roleName === 'ADJUSTER' || roleName === 'ADMIN' || !roleName"
        routerLink="/assign-claim" routerLinkActive="active">
        <div class="ds-icon-box">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" />
            <circle cx="8.5" cy="7" r="4" />
            <line x1="20" y1="8" x2="20" y2="14" />
            <line x1="23" y1="11" x2="17" y2="11" />
          </svg>
        </div>
        <span>Assign Claim</span>
      </div>

      <div class="ds-pill-item" *ngIf="roleName === 'ADJUSTER' || roleName === 'ADMIN' || !roleName"
        routerLink="/update-claim" routerLinkActive="active">
        <div class="ds-icon-box">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="22 12 18 12 15 21 9 3 6 12 2 12" />
          </svg>
        </div>
        <span>Manage Claims</span>
      </div>

      <div class="ds-pill-item" *ngIf="roleName === 'UNDERWRITER' || roleName === 'ADMIN' || !roleName"
        routerLink="/update-claim-investigator" routerLinkActive="active">
        <div class="ds-icon-box">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="22 12 18 12 15 21 9 3 6 12 2 12" />
          </svg>
        </div>
        <span>Review Claims</span>
      </div>

      <div class="ds-pill-item" *ngGot="roleName === 'INVESTIGATOR' || roleName === 'ADMIN' || !roleName"
        routerLink="/create-investigator" routerLinkActive="active">
        <div class="ds-icon-box">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" />
          </svg>
        </div>
        <span>Investigators</span>
      </div>
    </div>
  </div>

  <div class="ds-bottom">
    <!-- Toggles & Logout row -->
    <div class="ds-toggles-row">
      <button class="ds-logout" (click)="logout()" title="Logout">
        <div class="ds-icon-box" style="width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; background: rgba(239, 68, 68, 0.1); border-radius: 12px; margin-left: -4px;">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
            <polyline points="16 17 21 12 16 7" />
            <line x1="21" y1="12" x2="9" y2="12" />
          </svg>
        </div>
        <span class="logout-text">Logout</span>
      </button>
    </div>
  </div>
</nav>
