<app-navbar></app-navbar>

<div class="cc-shell">
  <div class="cc-container">
    <div class="cc-card">

      <!-- CURVED DARK BANNER -->
      <div class="cc-banner">
        <div class="cc-banner-dots"></div>

        <div class="cc-banner-pill">
          <div class="cc-pill-dot"></div>
          Insurance Portal
        </div>

        <h2>Create a Claim</h2>
        <p>Provide details below to file a new insurance claim securely.</p>

        <svg class="cc-banner-wave" viewBox="0 0 480 52" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none">
          <path d="M0,52 L0,18 C80,2 160,0 240,14 C320,28 400,44 480,28 L480,52 Z" fill="#ffffff"/>
          <path d="M0,52 L0,30 C100,14 200,8 300,20 C390,30 440,42 480,36 L480,52 Z" fill="#f0f0f5" opacity="0.6"/>
        </svg>
      </div>

      <!-- FORM BODY -->
      <div class="cc-body">
        <form [formGroup]="itemForm" (ngSubmit)="onSubmit()" class="cc-form">

          <!-- ✅ INSURANCE DROPDOWN -->
          <div class="cc-field dropdown">
            <label>Insurance Type</label>

            <!-- 🔥 FIXED CLICK -->
            <div class="dropdown-box" (click)="toggleInsuranceDropdown($event)">
              {{ selectedInsuranceText || 'Select Insurance Type' }}
              <span class="arrow">▼</span>
            </div>

            <!-- 🔥 STOP PROPAGATION -->
            <div 
              class="dropdown-menu" 
              *ngIf="insuranceDropdownOpen"
              (click)="$event.stopPropagation()"
            >

              <input
                type="text"
                placeholder="Search insurance..."
                [(ngModel)]="insuranceSearch"
                [ngModelOptions]="{ standalone: true }"
                (input)="filterInsuranceTypes()"
                (click)="$event.stopPropagation()"
              />

              <div class="dropdown-list">
                <div
                  class="dropdown-item"
                  *ngFor="let type of filteredInsuranceTypes"
                  (click)="selectInsuranceType(type)"
                >
                  {{ type }}
                </div>
              </div>

            </div>
          </div>

          <div class="cc-field">
            <label>Description of Incident</label>
            <textarea
              rows="5"
              placeholder="What happened? Please describe the incident in detail..."
              formControlName="description">
            </textarea>
          </div>

          <div class="cc-field">
            <label>Incident Date</label>
            <input type="date" formControlName="date" [max]="maxDate"/>
          </div>

          <input type="text" formControlName="status" hidden>

          <button type="submit" class="cc-submit-btn" [disabled]="!itemForm.valid">
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
              <path d="M22 2L11 13"/>
              <polygon points="22 2 15 22 11 13 2 9 22 2"/>
            </svg>
            Submit Claim
          </button>

        </form>

        <div class="cc-msg-box success" *ngIf="showMessage">
          {{ responseMessage }}
        </div>

        <div class="cc-msg-box error" *ngIf="showError">
          {{ errorMessage }}
        </div>

        <div class="cc-footer-note">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="11" width="18" height="11" rx="2"/>
            <path d="M7 11V7a5 5 0 0110 0v4"/>
          </svg>
          Encrypted &amp; secure
        </div>

      </div>
    </div>
  </div>
</div>
