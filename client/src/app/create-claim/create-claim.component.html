<div class="page">
    <h1 class="page-title">Create Claim</h1>

    <div class="card form-card">
        <form [formGroup]="itemForm" (ngSubmit)="onSubmit()">
            <label>Description</label>
            <textarea rows="4" placeholder="Describe the incident" formControlName="description"></textarea>

            <label>Incident Date</label>
            <input type="date" formControlName="date">

            <input type="text" formControlName="date" value="Created" hidden>

            <button>Create Claim</button>
        </form>

        <p *ngIf="showMessage">{{responseMessage}}</p>
        <p *ngIf="showError">{{errorMessage}}</p>
    </div>
</div>
