<app-navbar></app-navbar>

<div class="page">

  <h1 class="page-title">View Claim Status</h1>

  <p class="error-message" *ngIf="showError">
    {{ errorMessage }}
  </p>

  <div class="table-card">

    <table>
      <thead>
        <tr>
          <th>Claim ID</th>
          <th>Description</th>
          <th>Status</th>
          <th>Date</th>
        </tr>
      </thead>

      <tbody>
        <tr *ngFor="let claim of claimList">

          <td><strong>#{{ claim.id }}</strong></td>

          <td>{{ claim.description }}</td>

          <td>
            <span class="status-tag">
              {{ claim.status }}
            </span>
          </td>

          <td>{{ claim.date | date }}</td>

        </tr>
      </tbody>
    </table>

  </div>
</div>
