<app-navbar></app-navbar>

<div class="page">
  <!-- HEADER -->
  <div class="page-header">
    <div class="header-text">
      <h1 class="page-title">View Claim Status</h1>
      <p class="page-subtitle">Track and monitor your submission history.</p>
    </div>

    <!-- SEARCH -->
    <div class="dh-search">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8" /><path d="m21 21-4.35-4.35" /></svg>
      <input
        type="text"
        placeholder="Search by Claim ID or Description..."
        (input)="searchByDescId($event)"
      />
    </div>
  </div>

  <!-- ERROR MESSAGE -->
  <p class="error-message" *ngIf="showError">
    {{ errorMessage }}
  </p>

  <!-- TABLE -->
  <div class="table-card">
    <table>
      <thead>
        <tr>
          <th>Claim ID</th>

          <!-- ✅ NEW -->
          <th>Type</th>

          <th>Description</th>
          <th>Status</th>
          <th>Date</th>
        </tr>
      </thead>

      <tbody>
        <tr *ngFor="let claim of searchFilter">
          <td>
            <strong>#{{ claim.id }}</strong>
          </td>

          <!-- ✅ NEW -->
          <td class="type-col">
            {{ claim.insuranceType || '-' }}
          </td>

          <td class="desc">
            {{ claim.description }}
          </td>

          <td>
            <span
              class="status-tag"
              [ngClass]="{
                'status-approved': claim.status === 'Approved',
                'status-rejected': claim.status === 'Rejected',
                'status-inprogress': claim.status === 'In progress',
                'status-initiated': claim.status === 'Initiated'
              }"
            >
              {{ claim.status }}
            </span>
          </td>

          <td>
            {{ claim.date | date }}
          </td>
        </tr>

        <!-- EMPTY STATE -->
        <tr *ngIf="searchFilter?.length === 0">
          <td colspan="5" class="empty">
            No claims found
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
