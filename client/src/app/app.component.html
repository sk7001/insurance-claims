<div class="app-layout" style="display: flex; flex-direction: row; height: 100vh; width: 100vw; overflow: hidden; background: #f0f0f5;">
  <!-- Sidebar sits next to content -->
  <app-navbar *ngIf="showSidebar"></app-navbar>

  <!-- Main scrollable content -->
  <main class="content-area" [class.has-sidebar]="showSidebar" 
        style="flex: 1; height: 100vh; overflow-y: auto; background: #f0f0f5; position: relative;">
    <router-outlet></router-outlet>
  </main>
</div>
