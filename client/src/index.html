<!doctype html>
<html lang="en">
<head>
  <script>
    (function() {
      var baseElement = document.querySelector('base');
      if (!baseElement) {
        baseElement = document.createElement('base');
        document.head.prepend(baseElement);
      }
      // Robust proxy matching: matches /proxy/XXXX/ dynamically
      const match = window.location.pathname.match(/^(.*?\/proxy\/\d+\/)/);
      if (match) {
        baseElement.setAttribute('href', match[0]);
      } else {
        baseElement.setAttribute('href', '/');
      }
    })();
  </script>
